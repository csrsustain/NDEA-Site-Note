/* ============================================================================
   HELPERS
   ============================================================================ */

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className=v;
    else if(k==="html") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  children.forEach(c=>{ if(typeof c==="string") e.appendChild(document.createTextNode(c)); else if(c) e.appendChild(c); });
  return e;
}

function field(labelText, inputEl, required=false, hint=null){
  const wrap = el("div",{class:"field"+(required?" required":"")});
  const lbl = el("label",{}, labelText, required?el("span",{class:"req"},"●"):null);
  wrap.appendChild(lbl);
  wrap.appendChild(inputEl);
  if(hint) wrap.appendChild(el("div",{class:"hint"},hint));
  return wrap;
}

function textInput(id, placeholder=""){
  return el("input",{type:"text", id, placeholder, autocomplete:"off"});
}
function dateInput(id){ return el("input",{type:"date", id}); }
function selectInput(id, options, placeholder="Select…"){
  const s = el("select",{id});
  s.appendChild(el("option",{value:""},placeholder));
  options.forEach(o=> s.appendChild(el("option",{value:o},o)));
  return s;
}
function textarea(id, rows=3){
  return el("textarea",{id,rows});
}

/* ============================================================================
   SECTION / PANEL BUILDERS
   ============================================================================ */

function section(title, conv, bodyEl){
  const sec = el("div",{class:"section"});
  const head = el("div",{class:"section-head"},
     el("span",{},title),
     conv? el("span",{class:"conv"}, "CONV. "+conv) : null
  );
  sec.appendChild(head);
  const body = el("div",{class:"section-body"});
  body.appendChild(bodyEl);
  sec.appendChild(body);
  return sec;
}

/* ---------- PROJECT PANEL ---------- */
function buildProjectPanel(){
  const panel = el("div",{id:"panel-project", class:"panel"});

  const g1 = el("div",{class:"grid2"});
  g1.appendChild(field("Site Address", textInput("p_address"), true));
  g1.appendChild(field("Assessor Name", textInput("p_assessor"), true));
  g1.appendChild(field("Assessor Email", (()=>{const i=textInput("p_assessor_email"); i.type="email"; i.placeholder="name@company.com"; return i;})(), false, "Completed site note will be emailed here automatically"));
  
  const postCodeInp = textInput("p_postcode");
  postCodeInp.addEventListener("input", handlePostcodeLookup);
  g1.appendChild(field("Postcode", postCodeInp, true));
  
  g1.appendChild(field("Membership Number", textInput("p_membership")));
  g1.appendChild(field("Date of Inspection", dateInput("p_date"), true));
  g1.appendChild(field("Assessment Level", selectInput("p_level",["L3","L4","L5","L3 & L4","New Build"]), true));
  g1.appendChild(field("Customer Contact Name", textInput("p_customer")));
  
  g1.appendChild(field("Weather Location", textInput("p_weather"), false, "Auto-filled from Postcode Area"));
  
  g1.appendChild(field("Customer Phone", textInput("p_phone")));
  g1.appendChild(field("Building Age", textInput("p_age"), true, "e.g. 1966–1968"));
  g1.appendChild(field("Customer Email", textInput("p_email")));
  g1.appendChild(field("Building Use / Classification (SIC)", selectInput("p_use",[
    "A1/A2 Retail and Financial/Professional Services",
    "A3/A4/A5 Restaurants and Cafes/Drinking Establishments and hot food takeaways",
    "B1 Offices and Workshop Businesses",
    "B2 to B7 General Industrial and Special Industrial Groups",
    "B8 Storage or Distribution",
    "C1 Hotels",
    "C2 Residential Institutions – Hospitals and Care Homes",
    "C2 Residential Institutions – Residential Schools",
    "C2 Residential Institutions – Universities and Colleges",
    "C2A Secure Residential Institutions",
    "D1 Non-residential Institutions – Community/Day Centre",
    "D1 Non-residential Institutions – Crown and County Courts",
    "D1 Non-residential Institutions – Education",
    "D1 Non-residential Institutions – Libraries Museums and Galleries",
    "D2 General Assembly and Leisure plus Night Clubs and Theatres",
    "Others – Emergency Services",
    "Others – Passenger terminals"
  ]), true));

  const g2 = el("div",{class:"grid2"});
  const occWrap = el("div",{class:"field"});
  occWrap.appendChild(el("label",{},"Occupancy"));
  const occRadio = el("div",{class:"radiogroup"});
  ["Occupied","Empty","Tenanted"].forEach(v=>{
    occRadio.appendChild(el("label",{},
      el("input",{type:"radio",name:"occupancy",value:v}), v));
  });
  occWrap.appendChild(occRadio);
  g2.appendChild(occWrap);

  g2.appendChild(field("Number of Floors", selectInput("p_floors",["1","2","3","4","5","6","7+"])));
  g2.appendChild(field("Access to All Parts", selectInput("p_access",["Yes","No","Partial"]), true));
  g2.appendChild(field("Conservation Status", selectInput("p_conservation",["No","Listed Building","Conservation Area"])));

  panel.appendChild(section("Survey Details","", (()=>{const w=el("div");w.appendChild(g1);w.appendChild(el("div",{style:"height:14px"}));w.appendChild(g2);return w;})()));

  // ---- investigations ----
  const invQs = [
    ["inv1","Any alterations / extensions since original construction?"],
    ["inv2","Occupier aware of any energy efficiency improvements (CWI, solar, etc.)?"],
    ["inv3","Building Regulations or Planning Approvals available?"],
    ["inv4","Power factor better than 0.9?"],
    ["inv5","Any contamination / asbestos-containing materials?"],
    ["inv6","Any risks or hazards on-site?"],
    ["inv7","On-site risk assessment completed? (MANDATORY)"],
  ];
  const invBody = el("div");
  invQs.forEach(([key,q])=>{
    const row = el("div",{class:"grid2",style:"margin-bottom:8px;align-items:start;"});
    row.appendChild(el("div",{style:"font-size:12.5px;padding-top:8px;"}, q));
    const sub = el("div",{style:"display:flex;gap:8px;"});
    sub.appendChild(selectInput(key+"_yn",["Y","N","N/A"],"Y/N"));
    sub.appendChild(textInput(key+"_detail","details if yes…"));
    row.appendChild(sub);
    invBody.appendChild(row);
  });
  panel.appendChild(section("Pre-Survey Investigations","",invBody));

  // ---- overview ----

/* ---------- AUTOMATIC POSTCODE LOOKUP HANDLER ---------- */
function handlePostcodeLookup(e) {
  const inputStr = e.target.value.trim().toUpperCase();
  const weatherField = document.getElementById("p_weather");
  if (!weatherField) return;

  const match = inputStr.match(/^[A-Z]{1,2}/);
  if (match) {
    const areaCode = match[0];
    if (WEATHER_LOOKUP[areaCode]) {
      weatherField.value = WEATHER_LOOKUP[areaCode];
    } else {
      weatherField.value = "";
    }
  } else {
    weatherField.value = "";
  }
}

/* ---------- REPEATABLE ROW TABLE BUILDER ---------- */
function makeRowTable(containerId, columns, addLabel){
  const wrap = el("div");
  const table = el("table",{class:"rowtable",id:containerId+"_table"});
  const thead = el("thead");
  const trh = el("tr");
  columns.forEach(c=> trh.appendChild(el("th",{},c.label)));
  trh.appendChild(el("th",{style:"width:30px"},""));
  thead.appendChild(trh);
  table.appendChild(thead);
  const tbody = el("tbody",{id:containerId+"_body"});
  table.appendChild(tbody);
  wrap.appendChild(table);

  function addRow(){
    const tr = el("tr");
    columns.forEach(c=>{
      const td = el("td");
      let input;
      if(c.type==="select"){
        input = selectInput(null, c.options, "");
      } else {
        input = textInput(null, c.placeholder||"");
      }
      input.dataset.key = c.key;
      td.appendChild(input);
      tr.appendChild(td);
    });
    const delTd = el("td");
    const delBtn = el("button",{class:"del-btn",type:"button",title:"Remove row"},"✕");
    delBtn.onclick = ()=> tr.remove();
    delTd.appendChild(delBtn);
    tr.appendChild(delTd);
    tbody.appendChild(tr);
  }

  const addBtn = el("button",{class:"add-row-btn",type:"button"}, "+ "+addLabel);
  addBtn.onclick = addRow;
  wrap.appendChild(addBtn);

  wrap._addRow = addRow;
  wrap._tbody = tbody;
  wrap._columns = columns;
  return wrap;
}

function readRowTable(wrap){
  const rows = [];
  wrap._tbody.querySelectorAll("tr").forEach(tr=>{
    const obj = {};
    tr.querySelectorAll("input,select").forEach(inp=>{
      obj[inp.dataset.key] = inp.value;
    });
    const hasData = Object.values(obj).some(v=>v && v.trim()!=="");
    if(hasData) rows.push(obj);
  });
  return rows;
}

function switchTab(id){
  document.querySelectorAll(".tab-btn").forEach(b=> b.classList.toggle("active", b.dataset.tab===id));
  document.querySelectorAll(".panel").forEach(p=> p.classList.toggle("active", p.id==="panel-"+id));

  const idx = TABS.findIndex(t=> t.id===id);
  const isLast = idx===TABS.length-1;
  const nextBtn = document.getElementById("btn-next");
  const genBtn = document.getElementById("btn-generate");
  if(isLast){
    nextBtn.style.display = "none";
    genBtn.style.display = "";
  } else {
    nextBtn.style.display = "";
    nextBtn.textContent = "Next: "+TABS[idx+1].label;
    genBtn.style.display = "none";
  }
}

  if(idx>-1 && idx<TABS.length-1){

    window.scrollTo({top:0,behavior:"smooth"});
  }
});

/* Converts the built #print-sheet DOM into a full, standalone HTML document
   (Word namespaces + inline/embedded styles, no CSS Grid) that Microsoft Word
   can open directly as a .doc file. Word's HTML renderer is based on an old
   layout engine, so - just like the email export below - grid layouts are
   converted to tables and everything is spelled out with plain CSS. */
function psToWordDocument(ps){
  const addr = (val("p_address")||"site").replace(/[^a-z0-9]+/gi,"_").slice(0,40);
  const dateStr = (val("p_date")||new Date().toISOString().slice(0,10));

  const parts = [];

  Array.from(ps.children).forEach(child=>{
    if(child.tagName === "H1"){
      parts.push(`<h1 style="font-family:Calibri,Arial,sans-serif;font-size:16pt;border-bottom:3px solid #2a4f66;padding-bottom:8px;margin:0 0 4px;">${child.innerHTML}</h1>`);
    } else if(child.classList && child.classList.contains("ps-sub")){
      parts.push(`<div style="font-family:'Courier New',monospace;font-size:9pt;color:#555555;margin-bottom:18px;">${child.innerHTML}</div>`);
    } else if(child.tagName === "H2"){
      const label = child.childNodes[0] ? child.childNodes[0].textContent : child.textContent;
      parts.push(`<h2 style="font-family:Calibri,Arial,sans-serif;font-size:11pt;text-transform:uppercase;letter-spacing:.3px;background:#2a4f66;color:#ffffff;padding:6px 10px;margin:20px 0 8px;">${escapeHtml(label)}</h2>`);
    } else if(child.tagName === "TABLE"){
      let tbl = '<table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10pt;font-family:Calibri,Arial,sans-serif;" cellpadding="5" cellspacing="0">';
      Array.from(child.children).forEach(tr=>{
        tbl += "<tr>";
        Array.from(tr.children).forEach(cell=>{
          const isHeader = cell.tagName === "TH";
          const tag = isHeader ? "th" : "td";
          const style = isHeader
            ? "background:#eef0f2;padding:5px 7px;border:1px solid #d8dadc;text-align:left;font-weight:bold;text-transform:uppercase;font-size:9pt;color:#444444;"
            : "padding:5px 7px;border:1px solid #d8dadc;vertical-align:top;";
          tbl += `<${tag} style="${style}">${cell.innerHTML || "&mdash;"}</${tag}>`;
        });
        tbl += "</tr>";
      });
      tbl += "</table>";
      parts.push(tbl);
    } else if(child.classList && child.classList.contains("kvrow")){
      const spans = child.querySelectorAll("span");
      let row = '<table style="width:100%;border-collapse:collapse;font-size:10pt;font-family:Calibri,Arial,sans-serif;margin-bottom:2px;"><tr>';
      spans.forEach(sp=>{
        const bold = sp.classList.contains("k");
        row += `<td style="padding:3px 6px;${bold?"font-weight:bold;color:#333333;width:150px;":""}">${sp.textContent||"&mdash;"}</td>`;
      });
      row += "</tr></table>";
      parts.push(row);
    } else if(child.classList && child.classList.contains("notesblock")){
      const kSpan = child.querySelector(".k");
      const label = kSpan ? kSpan.textContent : "";
      const text = (kSpan ? child.textContent.replace(label,"") : child.textContent).trim();
      parts.push(`<div style="font-size:10pt;font-family:Calibri,Arial,sans-serif;padding:6px 0;border-bottom:1px solid #eeeeee;">${label?`<strong style="display:block;margin-bottom:3px;color:#333333;">${escapeHtml(label)}</strong>`:""}<span style="white-space:pre-wrap;">${escapeHtml(text)||"&mdash;"}</span></div>`);
    } else if(child.classList && child.classList.contains("sign")){
      let sign = '<table style="width:100%;border-collapse:collapse;margin-top:26px;font-size:9pt;font-family:Calibri,Arial,sans-serif;color:#555555;"><tr>';
      Array.from(child.children).forEach(div=>{
        sign += `<td style="width:50%;border-top:1px solid #555555;padding-top:5px;">${div.textContent}</td>`;
      });
      sign += "</tr></table>";
      parts.push(sign);
    }
  });

  const bodyHtml = parts.join("\n");

  // Minimal MS Word XML namespaces so Word recognises and opens this cleanly
  // as a native document rather than treating it as a generic web page.
  const doc = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>NDEA Site Note</title>
<!--[if gte mso 9]>
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>100</w:Zoom>
<w:DoNotOptimizeForBrowser/>
</w:WordDocument>
</xml>
<![endif]-->
<style>
  @page { size: 21cm 29.7cm; margin: 2cm; }
  body { font-family: Georgia, 'Times New Roman', serif; color:#1c1f22; font-size:10.5pt; }
</style>
</head>
<body>
${bodyHtml}
</body>
</html>`;

  return { doc, filename: `NDEA_Site_Note_${addr}_${dateStr}.doc` };
}

/* Converts the built #print-sheet DOM into inline-styled HTML suitable for
   pasting into an email body (email clients ignore external/class-based CSS,
   so every style must be inline). This lets us send the full site note as
   readable text/HTML in the email itself - no paid attachment plan needed. */
function psToEmailHtml(ps){
  const out = [];
  Array.from(ps.children).forEach(child=>{
    if(child.tagName === "H2"){
      const label = child.childNodes[0] ? child.childNodes[0].textContent : child.textContent;
      out.push(`<h2 style="background:#2a4f66;color:#ffffff;font-size:13px;font-weight:600;margin:18px 0 6px;padding:6px 10px;text-transform:uppercase;letter-spacing:.3px;font-family:Arial,sans-serif;">${escapeHtml(label)}</h2>`);
    } else if(child.tagName === "TABLE"){
      let tbl = '<table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px;font-family:Arial,sans-serif;">';
      Array.from(child.children).forEach(tr=>{
        tbl += "<tr>";
        Array.from(tr.children).forEach(cell=>{
          const isHeader = cell.tagName === "TH";
          const tag = isHeader ? "th" : "td";
          const style = isHeader
            ? "background:#eef0f2;padding:5px 7px;border:1px solid #d8dadc;text-align:left;font-weight:700;"
            : "padding:5px 7px;border:1px solid #d8dadc;vertical-align:top;";
          tbl += `<${tag} style="${style}">${cell.innerHTML || "&mdash;"}</${tag}>`;
        });
        tbl += "</tr>";
      });
      tbl += "</table>";
      out.push(tbl);
    } else if(child.classList && child.classList.contains("kvrow")){
      const spans = child.querySelectorAll("span");
      let row = '<table style="width:100%;border-collapse:collapse;font-size:12px;font-family:Arial,sans-serif;"><tr>';
      spans.forEach(sp=>{
        const bold = sp.classList.contains("k");
        row += `<td style="padding:3px 6px;${bold?"font-weight:700;color:#333;width:150px;":""}">${sp.textContent||"&mdash;"}</td>`;
      });
      row += "</tr></table>";
      out.push(row);
    } else if(child.classList && child.classList.contains("notesblock")){
      const kSpan = child.querySelector(".k");
      const label = kSpan ? kSpan.textContent : "";
      const text = (kSpan ? child.textContent.replace(label,"") : child.textContent).trim();
      out.push(`<div style="font-size:12px;padding:6px 0;border-bottom:1px solid #eee;font-family:Arial,sans-serif;">${label?`<strong style="display:block;margin-bottom:3px;color:#333;">${escapeHtml(label)}</strong>`:""}<span style="white-space:pre-wrap;">${escapeHtml(text)||"&mdash;"}</span></div>`);
    }
    // signature block and title box are intentionally skipped in the email body
  });
  return out.join("\n");
}

if(EMAIL_CONFIG.EMAIL_ENABLED && window.emailjs){
  try{ emailjs.init({publicKey: EMAIL_CONFIG.EMAILJS_PUBLIC_KEY}); }catch(err){ console.error("EmailJS init failed", err); }
}

function isValidEmail(addr){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(addr);
}

async function sendSiteNoteEmail(){
  const statusEl = document.getElementById("status-text");
  const assessorEmail = (val("p_assessor_email")||"").trim();

  if(!assessorEmail) return; // nothing to do, field left blank

  if(!EMAIL_CONFIG.EMAIL_ENABLED){
    statusEl.innerHTML += ' <span style="color:var(--amber)">— email not sent (email delivery not configured)</span>';
    return;
  }
  if(!isValidEmail(assessorEmail)){
    statusEl.innerHTML += ' <span style="color:var(--amber)">— email not sent (Assessor Email looks invalid)</span>';
    return;
  }

  statusEl.innerHTML = "Word document generated ✓ — sending email to " + escapeHtml(assessorEmail) + "…";

  const ps = document.getElementById("print-sheet");
  const siteNoteHtml = psToEmailHtml(ps);

  try{
    await emailjs.send(EMAIL_CONFIG.EMAILJS_SERVICE_ID, EMAIL_CONFIG.EMAILJS_TEMPLATE_ID, {
      to_email: assessorEmail,
      assessor_name: val("p_assessor")||"",
      site_address: val("p_address")||"",
      survey_date: val("p_date")||"",
      site_note_content: siteNoteHtml
    });
    statusEl.innerHTML = 'Word document generated <span>✓</span> — emailed to ' + escapeHtml(assessorEmail);
  }catch(err){
    console.error("Email send failed", err);
    statusEl.innerHTML = 'Word document generated <span>✓</span> — <span style="color:var(--amber)">email failed to send (see console)</span>';
  }
}

document.getElementById("btn-generate").addEventListener("click", async ()=>{
  const statusEl = document.getElementById("status-text");
  statusEl.innerHTML = "Building Word document…";
  buildPrintSheet();

  await new Promise(r=>setTimeout(r, 50)); // allow DOM to paint

  const ps = document.getElementById("print-sheet");

  try{
    const { doc, filename } = psToWordDocument(ps);

    // Word opens well-formed HTML directly when saved with a .doc extension,
    // so no external library is needed to produce a genuine, editable
    // Word-openable file (tables, headings and formatting all carry over).
    const blob = new Blob(['\ufeff', doc], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    statusEl.innerHTML = 'Word document generated <span>✓</span> — check your downloads folder';

    // Attempt to email the site note (as formatted text) to the Assessor Email address, if provided.
    await sendSiteNoteEmail();
  }catch(err){
    console.error(err);
    statusEl.textContent = "Error generating Word document — see console";
  }
});

document.getElementById("btn-clear").addEventListener("click", ()=>{
  if(!confirm("Clear all entered data on this form? This cannot be undone.")) return;
  document.querySelectorAll("input[type=text], input[type=date], input[type=number], textarea").forEach(i=> i.value="");
  document.querySelectorAll("select").forEach(s=> s.value="");
  document.querySelectorAll("input[type=checkbox]").forEach(c=> c.checked=false);
  document.querySelectorAll("input[type=radio]").forEach(r=> r.checked=false);
  Object.values(fabricTables).forEach(t=> t._tbody.innerHTML="");
  Object.values(hvacTable).forEach(t=> t._tbody && (t._tbody.innerHTML=""));
  Object.values(dhwTable).forEach(t=> t._tbody && (t._tbody.innerHTML=""));
  Object.values(lightTable).forEach(t=> t._tbody && (t._tbody.innerHTML=""));
  Object.values(renTable).forEach(t=> t._tbody && (t._tbody.innerHTML=""));
  document.getElementById("status-text").textContent = "Draft — not yet generated";
});
